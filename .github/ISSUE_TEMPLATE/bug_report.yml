name: Bug report
description: Report incorrect behavior with a reproducible example.
title: "bug: "
labels:
  - bug
  - needs-repro
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Provide code, CSV rows, commands, or a failing test.
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Module tag, commit, or pseudo-version.
    validations:
      required: true
  - type: input
    id: go-version
    attributes:
      label: Go version
      description: Output of `go version`.
    validations:
      required: true
