name: codeql

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "24 3 * * 1"

permissions:
  security-events: write
  packages: read
  actions: read
  contents: read

env:
  GOTOOLCHAIN: local

jobs:
  analyze:
    name: analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version: "1.26.x"
          cache: true

      - uses: github/codeql-action/init@v4
        with:
          languages: go

      - uses: github/codeql-action/analyze@v4
        with:
          category: /language:go
