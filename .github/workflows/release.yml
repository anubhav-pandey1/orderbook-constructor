name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  GOTOOLCHAIN: local

jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version: "1.26.x"
          cache: true

      - name: Format check
        run: |
          test -z "$(gofmt -l .)"

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Race test
        run: go test -race ./...

      - name: Staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@v0.7.0
          staticcheck ./...

      - name: Vulnerability check
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.6.0
          govulncheck ./...

      - name: External import smoke
        run: |
          tmp="$(mktemp -d)"
          cat > "$tmp/go.mod" <<'EOF'
          module smoke

          go 1.20

          require github.com/anubhav-pandey1/orderbook-constructor v0.0.0

          replace github.com/anubhav-pandey1/orderbook-constructor => ${{ github.workspace }}
          EOF
          cat > "$tmp/main.go" <<'EOF'
          package smoke

          import (
            "testing"

            "github.com/anubhav-pandey1/orderbook-constructor/book"
            "github.com/anubhav-pandey1/orderbook-constructor/feed"
            "github.com/anubhav-pandey1/orderbook-constructor/feed/gencsv"
            "github.com/anubhav-pandey1/orderbook-constructor/replay"
          )

          func TestImports(t *testing.T) {
            _ = book.New(8)
            if _, err := feed.NormalizeStreamID("binance", "BTC/USDT"); err != nil {
              t.Fatal(err)
            }
            if _, err := gencsv.NewGenerator(gencsv.DefaultConfig()); err != nil {
              t.Fatal(err)
            }
            _ = replay.NewArrivalOrderPolicy()
          }
          EOF
          cd "$tmp"
          go test ./...

      - name: Extract release notes
        run: |
          tag="${GITHUB_REF_NAME}"
          awk -v tag="$tag" '
            $0 ~ "^## " tag "([[:space:]]|$)" { found=1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            printf '%s\n' "See CHANGELOG.md for release notes." > release-notes.md
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --notes-file release-notes.md

      - name: Warm Go module proxy
        run: GOPROXY=proxy.golang.org go list -m "github.com/anubhav-pandey1/orderbook-constructor@${GITHUB_REF_NAME}"
