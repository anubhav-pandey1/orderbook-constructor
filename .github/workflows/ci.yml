name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  GOTOOLCHAIN: local

jobs:
  test:
    name: Go ${{ matrix.go }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go:
          - "1.20.x"
          - "1.21.x"
          - "1.22.x"
          - "1.23.x"
          - "1.24.x"
          - "1.25.x"
          - "1.26.x"

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: Format check
        run: |
          test -z "$(gofmt -l .)"

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Race test
        run: go test -race ./...

  analysis:
    name: analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true

      - name: Staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@v0.7.0
          staticcheck ./...

      - name: Vulnerability check
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.6.0
          govulncheck ./...

      - name: Benchmark smoke
        run: go test -run '^$' -bench . -benchmem -benchtime=1x ./...

      - name: Examples
        run: |
          go run ./examples/basic
          go run ./examples/decode
          go run ./examples/replay_metrics
          go run ./examples/replay_strategy

      - name: External import smoke
        run: |
          tmp="$(mktemp -d)"
          cat > "$tmp/go.mod" <<'EOF'
          module smoke

          go 1.20

          require github.com/anubhav-pandey1/orderbook-constructor v0.0.0

          replace github.com/anubhav-pandey1/orderbook-constructor => ${{ github.workspace }}
          EOF
          cat > "$tmp/main.go" <<'EOF'
          package smoke

          import (
            "testing"

            "github.com/anubhav-pandey1/orderbook-constructor/book"
            "github.com/anubhav-pandey1/orderbook-constructor/feed"
            "github.com/anubhav-pandey1/orderbook-constructor/feed/gencsv"
            "github.com/anubhav-pandey1/orderbook-constructor/replay"
          )

          func TestImports(t *testing.T) {
            _ = book.New(8)
            if _, err := feed.NormalizeStreamID("binance", "BTC/USDT"); err != nil {
              t.Fatal(err)
            }
            if _, err := gencsv.NewGenerator(gencsv.DefaultConfig()); err != nil {
              t.Fatal(err)
            }
            _ = replay.NewArrivalOrderPolicy()
          }
          EOF
          cd "$tmp"
          go test ./...

  platform-smoke:
    name: ${{ matrix.os }} Go 1.26.x
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - macos-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true

      - name: Test
        run: go test ./...
